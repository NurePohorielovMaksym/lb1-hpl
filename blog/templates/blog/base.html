<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Блог</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #333; }
        .article { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
        input, textarea { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 8px 16px; background: #333; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Статті</a>
        <a href="/article/new/">Нова стаття</a>
        {% if user.is_authenticated %}
            {{ user.username }} | <a href="/logout/">Вийти</a>
        {% else %}
            <a href="/login/">Увійти</a>
            <a href="/register/">Реєстрація</a>
        {% endif %}
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
